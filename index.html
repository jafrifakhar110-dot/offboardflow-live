<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OffboardFlow - Employee Offboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50">

<div id="app" class="min-h-screen"></div>

<script>
    // Demo users - each company gets their own data
    const companies = [
        { id: "comp_1", name: "Acme Inc", email: "admin@acme.com", password: "admin123", employees: [
            { id: 1, name: "John Doe", email: "john@acme.com", department: "Engineering" },
            { id: 2, name: "Jane Smith", email: "jane@acme.com", department: "Sales" }
        ], history: [] },
        { id: "comp_2", name: "TechCorp", email: "admin@techcorp.com", password: "admin123", employees: [
            { id: 1, name: "Bob Wilson", email: "bob@techcorp.com", department: "Product" },
            { id: 2, name: "Alice Brown", email: "alice@techcorp.com", department: "Marketing" }
        ], history: [] }
    ];
    
    let currentCompany = null;
    let notifications = [];

    function addNotification(message, type = "info") {
        notifications.unshift({ id: Date.now(), message, type });
        if (notifications.length > 5) notifications.pop();
        render();
        setTimeout(() => { notifications = notifications.filter(n => n.id !== notifications[notifications.length-1]?.id); render(); }, 3000);
    }

    function offboardEmployee(employeeId) {
        const employee = currentCompany.employees.find(e => e.id === employeeId);
        if (!employee) return;

        if (confirm(`⚠️ OFFBOARD ${employee.name}?\n\nThis will revoke access from:\n• Google Workspace\n• Slack\n• GitHub\n• Microsoft 365\n• Zoom`)) {
            
            currentCompany.history.unshift({
                id: Date.now(),
                employeeName: employee.name,
                employeeEmail: employee.email,
                timestamp: new Date(),
                actions: [
                    "✅ Google Workspace: Account suspended",
                    "✅ Slack: User deactivated",
                    "✅ GitHub: Removed from organization",
                    "✅ Drive: Files transferred to manager",
                    "✅ Compliance report: Generated"
                ]
            });
            
            currentCompany.employees = currentCompany.employees.filter(e => e.id !== employeeId);
            addNotification(`✅ Offboarded ${employee.name}`, "success");
            render();
        }
    }

    function handleLogin(email, password) {
        const company = companies.find(c => c.email === email && c.password === password);
        if (company) {
            currentCompany = { ...company, employees: [...company.employees], history: [...company.history] };
            addNotification(`Welcome to ${currentCompany.name}!`, "success");
            render();
        } else {
            alert("Invalid credentials.\n\nDemo companies:\nadmin@acme.com / admin123\nadmin@techcorp.com / admin123");
        }
    }

    function handleLogout() {
        currentCompany = null;
        render();
    }

    function LoginPage() {
        return `
            <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
                <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 fade-in">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <h1 class="text-3xl font-bold text-gray-900">OffboardFlow</h1>
                        <p class="text-gray-500 mt-2">Multi-company SaaS Demo</p>
                    </div>
                    
                    <form id="loginForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Company Email</label>
                            <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="admin@acme.com" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="••••••" required>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">Sign In</button>
                    </form>
                    
                    <div class="mt-6 text-center text-sm text-gray-500">
                        <p class="font-medium">Demo Companies:</p>
                        <p class="text-xs mt-1">Acme Inc: admin@acme.com / admin123</p>
                        <p class="text-xs">TechCorp: admin@techcorp.com / admin123</p>
                        <p class="text-xs text-blue-600 mt-2">Each company sees ONLY their own employees</p>
                    </div>
                </div>
            </div>
        `;
    }

    function DashboardPage() {
        return `
            <div class="min-h-screen bg-gray-50">
                <header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between items-center h-16">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                    </svg>
                                </div>
                                <h1 class="text-xl font-bold text-gray-900">OffboardFlow</h1>
                                <span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded-full">${currentCompany.name}</span>
                            </div>
                            <div class="flex items-center space-x-4">
                                <div class="text-sm text-gray-600">${currentCompany.email}</div>
                                <button onclick="handleLogout()" class="text-red-600 hover:text-red-800 text-sm">Sign Out</button>
                            </div>
                        </div>
                    </div>
                </header>

                <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    <!-- Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                            <p class="text-sm text-gray-500">Active Employees</p>
                            <p class="text-3xl font-bold text-gray-900">${currentCompany.employees.length}</p>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                            <p class="text-sm text-gray-500">Offboarded (All Time)</p>
                            <p class="text-3xl font-bold text-gray-900">${currentCompany.history.length}</p>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                            <p class="text-sm text-gray-500">Connected Apps</p>
                            <p class="text-3xl font-bold text-gray-900">5</p>
                        </div>
                    </div>

                    ${notifications.length > 0 ? `
                    <div class="mb-6 space-y-2">
                        ${notifications.map(n => `<div class="bg-${n.type === 'success' ? 'green' : 'blue'}-50 border border-${n.type === 'success' ? 'green' : 'blue'}-200 rounded-lg p-3 text-sm text-${n.type === 'success' ? 'green' : 'blue'}-800">${n.message}</div>`).join('')}
                    </div>
                    ` : ''}

                    <!-- Integrations -->
                    <div class="mb-8">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">Connected Integrations</h2>
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                            ${['Google Workspace', 'Slack', 'GitHub', 'Microsoft 365', 'Zoom'].map(app => `
                                <div class="bg-white rounded-lg p-3 text-center border border-gray-200">
                                    <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2">
                                        <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                    </div>
                                    <p class="text-xs font-medium text-gray-700">${app}</p>
                                    <p class="text-xs text-green-600">Connected</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Employee Table -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-200">
                            <h2 class="text-lg font-semibold text-gray-900">Active Employees</h2>
                            <p class="text-sm text-gray-500">${currentCompany.employees.length} employee(s)</p>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Department</th>
                                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-200">
                                    ${currentCompany.employees.map(emp => `
                                        <tr class="hover:bg-gray-50">
                                            <td class="px-6 py-4 text-sm font-medium text-gray-900">${emp.name}</td>
                                            <td class="px-6 py-4 text-sm text-gray-500">${emp.email}</td>
                                            <td class="px-6 py-4 text-sm text-gray-500">${emp.department}</td>
                                            <td class="px-6 py-4 text-right">
                                                <button onclick="offboardEmployee(${emp.id})" class="bg-red-600 text-white px-4 py-1.5 rounded-lg text-sm hover:bg-red-700 transition">Offboard</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        ${currentCompany.employees.length === 0 ? '<div class="text-center py-12"><p class="text-gray-500">No active employees. Add employees in your company dashboard.</p></div>' : ''}
                    </div>

                    <!-- Demo Note -->
                    <div class="mt-8 bg-blue-50 border border-blue-200 rounded-lg p-4">
                        <p class="text-sm text-blue-800">
                            <strong>🔐 Multi-Tenant Demo</strong><br>
                            Each company sees ONLY their own employees and offboarding history.<br>
                            <span class="text-xs mt-1 block">Acme Inc has Engineering + Sales • TechCorp has Product + Marketing</span>
                        </p>
                    </div>

                    <!-- Offboarding History -->
                    ${currentCompany.history.length > 0 ? `
                    <div class="mt-8 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-200">
                            <h2 class="text-lg font-semibold text-gray-900">Recent Offboarding</h2>
                        </div>
                        <div class="divide-y divide-gray-200">
                            ${currentCompany.history.slice(0, 5).map(h => `
                                <div class="px-6 py-4">
                                    <div class="flex justify-between items-start mb-2">
                                        <div>
                                            <p class="font-medium text-gray-900">${h.employeeName}</p>
                                            <p class="text-sm text-gray-500">${h.employeeEmail}</p>
                                        </div>
                                        <span class="text-xs text-gray-400">${new Date(h.timestamp).toLocaleString()}</span>
                                    </div>
                                    <div class="text-sm text-gray-600 space-y-1">
                                        ${h.actions.map(a => `<p class="text-xs">${a}</p>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                </main>
            </div>
        `;
    }

    function render() {
        const app = document.getElementById("app");
        if (!currentCompany) {
            app.innerHTML = LoginPage();
            const form = document.getElementById("loginForm");
            if (form) {
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;
                    handleLogin(email, password);
                });
            }
        } else {
            app.innerHTML = DashboardPage();
        }
    }

    window.offboardEmployee = offboardEmployee;
    window.handleLogout = handleLogout;
    render();
</script>
</body>
</html>
