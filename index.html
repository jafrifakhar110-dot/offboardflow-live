<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OffboardFlow - Employee Offboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50">

<div id="app" class="min-h-screen"></div>

<script>
    // ---------- STATE ----------
    let currentUser = null;
    let employees = [
        { id: 1, name: "John Doe", email: "john@company.com", department: "Engineering", status: "active" },
        { id: 2, name: "Jane Smith", email: "jane@company.com", department: "Sales", status: "active" },
        { id: 3, name: "Bob Wilson", email: "bob@company.com", department: "Marketing", status: "active" },
        { id: 4, name: "Alice Brown", email: "alice@company.com", department: "HR", status: "active" },
        { id: 5, name: "Charlie Lee", email: "charlie@company.com", department: "Product", status: "active" }
    ];
    let offboardHistory = [];
    let notifications = [];

    // Demo users for login
    const demoUsers = [
        { email: "admin@offboardflow.com", password: "admin123", name: "Admin User", role: "admin" },
        { email: "hr@offboardflow.com", password: "hr123", name: "HR Manager", role: "hr" }
    ];

    // ---------- HELPER FUNCTIONS ----------
    function addNotification(message, type = "info") {
        notifications.unshift({ id: Date.now(), message, type, timestamp: new Date() });
        if (notifications.length > 5) notifications.pop();
        render();
    }

    function offboardEmployee(employeeId) {
        const employee = employees.find(e => e.id === employeeId);
        if (!employee) return;

        if (confirm(`⚠️ Offboard ${employee.name} (${employee.email})?\n\nThis will:\n• Revoke Google Workspace access\n• Remove from Slack channels\n• Remove from GitHub org\n• Transfer Drive files\n• Generate compliance report`)) {
            
            // Simulate offboarding process
            employee.status = "offboarded";
            
            // Add to history
            offboardHistory.unshift({
                id: Date.now(),
                employeeName: employee.name,
                employeeEmail: employee.email,
                offboardedBy: currentUser?.name || "System",
                timestamp: new Date(),
                actions: [
                    "✅ Google Workspace: Account suspended",
                    "✅ Slack: User deactivated and removed from channels",
                    "✅ GitHub: Removed from organization",
                    "✅ Drive: Files transferred to manager",
                    "✅ Compliance report generated"
                ]
            });
            
            // Remove from active list
            employees = employees.filter(e => e.id !== employeeId);
            
            addNotification(`✅ Offboarded ${employee.name}`, "success");
            render();
        }
    }

    function handleLogin(email, password) {
        const user = demoUsers.find(u => u.email === email && u.password === password);
        if (user) {
            currentUser = { ...user };
            addNotification(`Welcome back, ${user.name}!`, "success");
            render();
        } else {
            alert("Invalid credentials. Try:\nadmin@offboardflow.com / admin123\nhr@offboardflow.com / hr123");
        }
    }

    function handleLogout() {
        currentUser = null;
        addNotification("Logged out successfully", "info");
        render();
    }

    // ---------- UI COMPONENTS ----------
    function LoginPage() {
        return `
            <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
                <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 fade-in">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <h1 class="text-3xl font-bold text-gray-900">OffboardFlow</h1>
                        <p class="text-gray-500 mt-2">One click. Full access revoked.</p>
                    </div>
                    
                    <form id="loginForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="admin@offboardflow.com" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="••••••" required>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">Sign In</button>
                    </form>
                    
                    <div class="mt-6 text-center text-sm text-gray-500">
                        <p>Demo credentials:</p>
                        <p class="text-xs mt-1">admin@offboardflow.com / admin123</p>
                        <p class="text-xs">hr@offboardflow.com / hr123</p>
                    </div>
                </div>
            </div>
        `;
    }

    function DashboardPage() {
        const activeEmployees = employees.filter(e => e.status === "active");
        
        return `
            <div class="min-h-screen bg-gray-50">
                <!-- Header -->
                <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between items-center h-16">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                    </svg>
                                </div>
                                <h1 class="text-xl font-bold text-gray-900">OffboardFlow</h1>
                            </div>
                            <div class="flex items-center space-x-4">
                                <div class="text-sm text-gray-600">
                                    <span class="font-medium">${currentUser?.name}</span>
                                    <span class="text-gray-400"> (${currentUser?.role})</span>
                                </div>
                                <button onclick="handleLogout()" class="text-gray-500 hover:text-gray-700">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </header>

                <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    <!-- Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">Active Employees</p>
                                    <p class="text-3xl font-bold text-gray-900">${activeEmployees.length}</p>
                                </div>
                                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">Offboarded (30 days)</p>
                                    <p class="text-3xl font-bold text-gray-900">${offboardHistory.length}</p>
                                </div>
                                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">Connected Apps</p>
                                    <p class="text-3xl font-bold text-gray-900">5</p>
                                </div>
                                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                                    <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4-3-9s1.34-9 3-9"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Notifications -->
                    ${notifications.length > 0 ? `
                    <div class="mb-6 space-y-2">
                        ${notifications.map(n => `
                            <div class="bg-white border border-gray-200 rounded-lg p-3 flex items-center justify-between shadow-sm fade-in">
                                <div class="flex items-center space-x-3">
                                    <span class="text-${n.type === 'success' ? 'green' : n.type === 'error' ? 'red' : 'blue'}-500">${n.type === 'success' ? '✓' : n.type === 'error' ? '✗' : 'ℹ'}</span>
                                    <span class="text-sm text-gray-600">${n.message}</span>
                                </div>
                                <span class="text-xs text-gray-400">${new Date(n.timestamp).toLocaleTimeString()}</span>
                            </div>
                        `).join('')}
                    </div>
                    ` : ''}

                    <!-- Integrations Status -->
                    <div class="mb-8">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">Connected Integrations</h2>
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                            ${['Google Workspace', 'Slack', 'GitHub', 'Microsoft 365', 'Zoom'].map(app => `
                                <div class="bg-white rounded-lg p-3 text-center border border-gray-200">
                                    <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2">
                                        <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                        </svg>
                                    </div>
                                    <p class="text-xs font-medium text-gray-700">${app}</p>
                                    <p class="text-xs text-green-600">Connected</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Employee Table -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                            <h2 class="text-lg font-semibold text-gray-900">Active Employees</h2>
                            <button class="text-sm text-blue-600 hover:text-blue-700">+ Add Employee</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Department</th>
                                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-200">
                                    ${activeEmployees.map(emp => `
                                        <tr class="hover:bg-gray-50">
                                            <td class="px-6 py-4 text-sm font-medium text-gray-900">${emp.name}</td>
                                            <td class="px-6 py-4 text-sm text-gray-500">${emp.email}</td>
                                            <td class="px-6 py-4 text-sm text-gray-500">${emp.department}</td>
                                            <td class="px-6 py-4 text-right">
                                                <button onclick="offboardEmployee(${emp.id})" class="text-red-600 hover:text-red-800 text-sm font-medium">
                                                    Offboard
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}}
                                </tbody>
                            </table>
                        </div>
                        ${activeEmployees.length === 0 ? `
                        <div class="text-center py-12">
                            <p class="text-gray-500">No active employees</p>
                        </div>
                        ` : ''}
                    </div>

                    <!-- Offboarding History -->
                    ${offboardHistory.length > 0 ? `
                    <div class="mt-8 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-200">
                            <h2 class="text-lg font-semibold text-gray-900">Recent Offboarding</h2>
                        </div>
                        <div class="divide-y divide-gray-200">
                            ${offboardHistory.slice(0, 5).map(history => `
                                <div class="px-6 py-4">
                                    <div class="flex justify-between items-start mb-2">
                                        <div>
                                            <p class="font-medium text-gray-900">${history.employeeName}</p>
                                            <p class="text-sm text-gray-500">${history.employeeEmail}</p>
                                        </div>
                                        <span class="text-xs text-gray-400">${new Date(history.timestamp).toLocaleString()}</span>
                                    </div>
                                    <div class="text-sm text-gray-600 space-y-1">
                                        ${history.actions.map(a => `<p class="text-xs">${a}</p>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                </main>
            </div>
        `;
    }

    // ---------- RENDER ----------
    function render() {
        const app = document.getElementById("app");
        if (!currentUser) {
            app.innerHTML = LoginPage();
            const form = document.getElementById("loginForm");
            if (form) {
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;
                    handleLogin(email, password);
                });
            }
        } else {
            app.innerHTML = DashboardPage();
        }
    }

    // Make functions global for onclick handlers
    window.offboardEmployee = offboardEmployee;
    window.handleLogout = handleLogout;
    window.handleLogin = handleLogin;

    // Initial render
    render();
</script>
</body>
</html>
